<!DOCTYPE html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:6px;font-family:var(--font-mono);font-size:11px}
  .row .tag{width:60px;color:var(--fg-4)}
  .row .bar{background:var(--brand);height:14px}
</style></head><body>
<div class="row"><span class="tag">space-2</span><div class="bar" style="width:8px"></div><span>0.5rem — inline gap</span></div>
<div class="row"><span class="tag">space-3</span><div class="bar" style="width:12px"></div><span>0.75rem — sidebar nav gap</span></div>
<div class="row"><span class="tag">space-4</span><div class="bar" style="width:16px"></div><span>1rem — card gap / mobile px</span></div>
<div class="row"><span class="tag">space-6</span><div class="bar" style="width:24px"></div><span>1.5rem — card padding</span></div>
<div class="row"><span class="tag">space-8</span><div class="bar" style="width:32px"></div><span>2rem — lg:px</span></div>
<div class="row"><span class="tag">space-12</span><div class="bar" style="width:48px"></div><span>3rem — auth card</span></div>
<div class="row"><span class="tag">space-16</span><div class="bar" style="width:64px"></div><span>4rem — public section py</span></div>
</body></html>
