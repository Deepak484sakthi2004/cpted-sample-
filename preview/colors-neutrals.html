<!DOCTYPE html><html><head><meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--border-default)}
  .step{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:8px 4px;height:90px;font-family:var(--font-mono);font-size:10px}
</style></head><body>
<div class="row">
  <div class="step" style="background:#F9FAFB;color:#111">50</div>
  <div class="step" style="background:#F3F4F6;color:#111">100</div>
  <div class="step" style="background:#E5E7EB;color:#111">200</div>
  <div class="step" style="background:#D1D5DB;color:#111">300</div>
  <div class="step" style="background:#9CA3AF;color:#fff">400</div>
  <div class="step" style="background:#6B7280;color:#fff">500</div>
  <div class="step" style="background:#4B5563;color:#fff">600</div>
  <div class="step" style="background:#374151;color:#fff">700</div>
  <div class="step" style="background:#1F2937;color:#fff">800</div>
  <div class="step" style="background:#111827;color:#fff">900</div>
</div>
<div style="font-size:11px;color:#6B7280;margin-top:8px;font-family:var(--font-mono)">Tailwind gray — the neutral workhorse (shadcn slate used for TipTap only)</div>
</body></html>
