<!DOCTYPE html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .tile{background:#0B2545;aspect-ratio:1;display:flex;align-items:flex-end;justify-content:center;padding:8px;color:#fff;font-size:11px;font-family:var(--font-mono)}
</style></head><body>
<div class="grid">
  <div class="tile" style="border-radius:2px">2px</div>
  <div class="tile" style="border-radius:4px">4px</div>
  <div class="tile" style="border-radius:6px">6px</div>
  <div class="tile" style="border-radius:8px">8px</div>
  <div class="tile" style="border-radius:12px">12px</div>
</div>
<div style="font-size:12px;color:var(--fg-4);margin-top:14px;line-height:1.5">Restrained, professional radii. 4px default (buttons, inputs) · 6px cards · 8px panels · 12px reserved for hero surfaces. No pill shapes on UI elements; only on status pills and avatars.</div>
</body></html>
