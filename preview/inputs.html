<!DOCTYPE html><html><head><meta charset="utf-8"><title>Form Controls</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  :root{
    --navy:#0B2545; --gold:#B08A3E; --ink:#1F2937; --mute:#6B7280;
    --line:#E5E7EB; --soft:#F5F5F3;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);color:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px 32px;align-items:start}

  .spec-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold);font-weight:600;margin-bottom:10px}

  /* --- 1. Underline input (label above, 1px underline, focus=gold) --- */
  .u-field{position:relative;padding-top:16px}
  .u-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--mute);font-weight:600;margin-bottom:8px}
  .u-field input{
    width:100%;border:0;border-bottom:1px solid var(--line);
    padding:6px 0 10px 0;font-size:14px;font-family:inherit;color:var(--navy);
    outline:none;background:transparent;transition:border-color .2s;
  }
  .u-field input::placeholder{color:#9CA3AF}
  .u-field input:focus{border-bottom-color:var(--gold)}
  .u-field .hint{font-size:11px;color:var(--mute);margin-top:6px;font-style:italic;font-family:"Newsreader",Georgia,serif}

  /* --- 2. Filled input with leading icon (search) --- */
  .s-wrap{display:flex;align-items:center;gap:10px;background:var(--soft);border:1px solid var(--line);padding:10px 14px;transition:border-color .15s,background .15s}
  .s-wrap:focus-within{border-color:var(--navy);background:#fff}
  .s-wrap svg{color:var(--mute);flex-shrink:0}
  .s-wrap:focus-within svg{color:var(--navy)}
  .s-wrap input{flex:1;border:0;background:transparent;outline:none;font-family:inherit;font-size:13.5px;color:var(--navy)}
  .s-wrap input::placeholder{color:#9CA3AF}
  .kbd{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--mute);border:1px solid var(--line);background:#fff;padding:1px 6px}

  /* --- 3. Select (custom chevron) --- */
  .sel-wrap{position:relative}
  select{
    appearance:none;-webkit-appearance:none;
    width:100%;padding:10px 36px 10px 14px;
    border:1px solid var(--line);background:#fff;
    font-family:inherit;font-size:13.5px;color:var(--navy);
    outline:none;transition:border-color .15s;
  }
  select:focus{border-color:var(--navy)}
  .sel-wrap::after{content:"";position:absolute;right:14px;top:50%;margin-top:-3px;width:8px;height:8px;border-right:1.5px solid var(--navy);border-bottom:1.5px solid var(--navy);transform:rotate(45deg) translateY(-2px);pointer-events:none}

  /* --- 4. Textarea --- */
  textarea{
    width:100%;border:1px solid var(--line);background:#fff;
    padding:10px 12px;font-family:inherit;font-size:13.5px;color:var(--navy);
    outline:none;resize:vertical;min-height:68px;line-height:1.5;
    transition:border-color .15s,box-shadow .15s;
  }
  textarea:focus{border-color:var(--navy)}

  /* --- 5. Checkbox --- */
  .chk{display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none;font-size:13px;color:var(--ink);line-height:1.45}
  .chk input{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid var(--line);background:#fff;margin:1px 0 0 0;position:relative;cursor:pointer;transition:border-color .15s,background .15s;flex-shrink:0}
  .chk input:checked{background:var(--navy);border-color:var(--navy)}
  .chk input:checked::after{content:"";position:absolute;left:4px;top:0px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .chk .sub{font-size:11px;color:var(--mute);font-family:"Newsreader",Georgia,serif;font-style:italic;margin-top:3px}

  /* --- 6. Toggle --- */
  .tog{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .tog .lbl{font-size:13px;color:var(--ink);font-weight:500}
  .tog .lbl .sub{display:block;font-size:11px;color:var(--mute);font-weight:400;margin-top:2px;font-family:"Newsreader",Georgia,serif;font-style:italic}
  .switch{position:relative;width:36px;height:20px;background:var(--line);cursor:pointer;transition:background .2s;border-radius:999px;flex-shrink:0}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:999px;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s}
  .switch.on{background:var(--navy)}
  .switch.on::after{transform:translateX(16px)}
</style></head><body>

<div class="grid">

  <!-- Underline input -->
  <div>
    <div class="spec-lbl">Text · Underline</div>
    <div class="u-field">
      <label>Full Name</label>
      <input placeholder="Dr. Anita Singh">
      <div class="hint">As it should appear on your credential.</div>
    </div>
  </div>

  <!-- Search -->
  <div>
    <div class="spec-lbl">Search</div>
    <div class="s-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Search programmes, modules…">
      <span class="kbd">⌘ K</span>
    </div>
  </div>

  <!-- Select -->
  <div>
    <div class="spec-lbl">Select</div>
    <div class="sel-wrap">
      <select>
        <option>Public sector</option>
        <option>Education</option>
        <option>Enterprise</option>
        <option>Residential</option>
      </select>
    </div>
  </div>

  <!-- Textarea -->
  <div>
    <div class="spec-lbl">Textarea</div>
    <textarea placeholder="Briefly describe the site, use case, and any access constraints…"></textarea>
  </div>

  <!-- Checkbox -->
  <div>
    <div class="spec-lbl">Checkbox</div>
    <label class="chk">
      <input type="checkbox" checked>
      <span>
        Subscribe to the Practice Quarterly
        <span class="sub">Four issues per year · unsubscribe anytime.</span>
      </span>
    </label>
  </div>

  <!-- Toggle -->
  <div>
    <div class="spec-lbl">Toggle</div>
    <div class="tog">
      <div class="lbl">
        Public profile
        <span class="sub">Show your credentials in the directory.</span>
      </div>
      <div class="switch on" onclick="this.classList.toggle('on')"></div>
    </div>
  </div>

</div>
</body></html>
