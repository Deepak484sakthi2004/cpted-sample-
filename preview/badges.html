<!DOCTYPE html><html><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.b{display:inline-flex;align-items:center;border-radius:4px;padding:2px 10px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.lbl{font-size:11px;color:#6B7280;font-family:var(--font-mono);min-width:110px;text-transform:uppercase;letter-spacing:.06em}
</style></head><body>
<div class="row"><span class="lbl">Enrolment</span>
  <span class="b" style="background:#E6F0EC;color:#16624A">Active</span>
  <span class="b" style="background:#F6E4E4;color:#9B2C2C">Revoked</span>
  <span class="b" style="background:#F3F4F6;color:#374151">Pending</span>
</div>
<div class="row"><span class="lbl">Role</span>
  <span class="b" style="background:#E8EEF5;color:#0B2545">Student</span>
  <span class="b" style="background:#0B2545;color:#fff">Administrator</span>
  <span class="b" style="background:#B08A3E;color:#fff">Faculty</span>
</div>
<div class="row"><span class="lbl">Level</span>
  <span class="b" style="background:#F5F5F3;color:#374151;border:1px solid #E5E7EB">Foundation</span>
  <span class="b" style="background:#F5F5F3;color:#374151;border:1px solid #E5E7EB">Associate</span>
  <span class="b" style="background:#F5F5F3;color:#374151;border:1px solid #E5E7EB">Practitioner</span>
</div>
</body></html>
