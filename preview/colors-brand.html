<!DOCTYPE html><html><head><meta charset="utf-8"><title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .sw{border-radius:6px;overflow:hidden;border:1px solid var(--border-default)}
  .sw .chip{height:96px}
  .sw .meta{padding:10px 12px;font-size:12px;line-height:1.4;background:#fff}
  .sw .name{font-weight:600;color:var(--fg-1)}
  .sw .hex{color:var(--fg-4);font-family:var(--font-mono);font-size:11px;margin-top:2px;letter-spacing:.02em}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#0B2545"></div><div class="meta"><div class="name">Brand · Navy</div><div class="hex">#0B2545</div></div></div>
  <div class="sw"><div class="chip" style="background:#1B3B6F"></div><div class="meta"><div class="name">Brand Light</div><div class="hex">#1B3B6F</div></div></div>
  <div class="sw"><div class="chip" style="background:#061936"></div><div class="meta"><div class="name">Brand Dark</div><div class="hex">#061936</div></div></div>
  <div class="sw"><div class="chip" style="background:#B08A3E"></div><div class="meta"><div class="name">Accent · Gold</div><div class="hex">#B08A3E</div></div></div>
  <div class="sw"><div class="chip" style="background:#8E6E2A"></div><div class="meta"><div class="name">Accent Hover</div><div class="hex">#8E6E2A</div></div></div>
  <div class="sw"><div class="chip" style="background:#111827"></div><div class="meta"><div class="name">Dark Surface</div><div class="hex">#111827</div></div></div>
</div>
</body></html>
