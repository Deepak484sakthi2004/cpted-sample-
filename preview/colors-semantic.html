<!DOCTYPE html><html><head><meta charset="utf-8"><title>Colors — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:4px 12px;border-radius:4px;font-size:12px;font-weight:500}
  .card{padding:14px;border-radius:6px;border:1px solid var(--border-default);flex:1;min-width:180px;background:#fff}
  .lbl{font-size:11px;color:var(--fg-4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:600}
</style></head><body>
<div class="row">
  <div class="card">
    <div class="lbl">Success</div>
    <span class="pill" style="background:#E6F0EC;color:#16624A">Active</span>
    <div style="color:#16624A;font-size:13px;font-weight:500;margin-top:12px">Enrollment confirmed</div>
  </div>
  <div class="card">
    <div class="lbl">Danger</div>
    <span class="pill" style="background:#F6E4E4;color:#9B2C2C">Revoked</span>
    <div style="color:#9B2C2C;font-size:13px;font-weight:500;margin-top:12px">Access suspended</div>
  </div>
  <div class="card">
    <div class="lbl">Information</div>
    <span class="pill" style="background:#E8EEF5;color:#0B2545">Student</span>
    <div style="color:var(--fg-4);font-size:11px;margin-top:12px;font-family:var(--font-mono)">navy-tinted neutral</div>
  </div>
</div>
</body></html>
