<!DOCTYPE html><html><head><meta charset="utf-8"><title>Imagery</title>
<style>body{margin:0;padding:12px;background:#fff;font-family:-apple-system,sans-serif}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cell{aspect-ratio:16/10;border-radius:8px;overflow:hidden;position:relative;background:#111}
.cell img{width:100%;height:100%;object-fit:cover;object-position:center 25%}
.cap{position:absolute;left:0;right:0;bottom:0;padding:8px 10px;color:#fff;font-size:11px;font-weight:600;background:linear-gradient(to top,rgba(0,0,0,.8),transparent)}
</style></head><body>
<div class="grid">
  <div class="cell"><img src="../assets/banner-safe-space.jpg"><div class="cap">Hero · safe space</div></div>
  <div class="cell"><img src="../assets/risk-assessment.jpg"><div class="cap">Risk assessment</div></div>
  <div class="cell"><img src="../assets/security-consulting.jpg"><div class="cap">Security consulting</div></div>
</div>
</body></html>
