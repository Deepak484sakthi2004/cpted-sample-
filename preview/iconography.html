<!DOCTYPE html><html><head><meta charset="utf-8"><title>Iconography</title>
<style>body{margin:0;padding:20px;background:#fff;font-family:-apple-system,sans-serif}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:#6B7280;font-family:ui-monospace,monospace}
.cell .sq{width:40px;height:40px;border-radius:8px;background:#F3F4F6;display:flex;align-items:center;justify-content:center;color:#374151}
</style></head><body>
<div class="grid" id="g"></div>
<div style="font-size:11px;color:#6B7280;margin-top:14px">Lucide icons — <code>lucide-react@0.575.0</code> in production. Loaded via CDN here.</div>
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js"></script>
<script>
  const names=['shield','book-open','eye','map-pin','mail','phone','layout-dashboard','award','shopping-bag','file-text','user','users','user-check','log-out','menu','chevron-left','chevron-right','search','dollar-sign','eye-off','x','check','arrow-right','plus'];
  const g=document.getElementById('g');
  names.forEach(n=>{
    const d=document.createElement('div');d.className='cell';
    d.innerHTML=`<div class="sq"><i data-lucide="${n}"></i></div><span>${n}</span>`;
    g.appendChild(d);
  });
  lucide.createIcons();
</script>
</body></html>
